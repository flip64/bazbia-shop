{% if messages %}
    <div class="dashboard-messages">
        {% for message in messages %}
            <div
                class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show"
                role="alert"
            >
                {{ message }}

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="بستن"
                ></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
