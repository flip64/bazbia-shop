<!-- مشخصات محصول -->
<div class="dashboard-card mb-4">

    <div
        class="p-3 p-md-4 border-bottom
               d-flex justify-content-between align-items-center gap-3"
    >
        <div>
            <h2 class="h5 mb-1">
                مشخصات محصول
            </h2>

            <div class="text-secondary small">
                {{ product.specifications.count }} مشخصه
            </div>
        </div>
    </div>

    <div class="p-3 p-md-4">

        {% if product.specifications.exists %}

            <div class="table-responsive">

                <table class="table table-bordered align-middle mb-0">

                    <thead class="table-light">
                        <tr>
                            <th style="width: 35%;">
                                عنوان مشخصه
                            </th>

                            <th>
                                مقدار
                            </th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for specification in product.specifications.all %}

                            <tr>
                                <td class="fw-semibold">
                                    {{ specification.name }}
                                </td>

                                <td>
                                    {{ specification.value }}
                                </td>
                            </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        {% else %}

            <div class="text-center text-secondary py-4">
                مشخصاتی برای این محصول ثبت نشده است.
            </div>

        {% endif %}

    </div>

</div>
