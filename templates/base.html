<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}بازبیا - فروشگاه آنلاین{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { font-family: Tahoma, sans-serif; }
        .product-card:hover {
            transform: scale(1.02);
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .top-alert { background: #ef394e; color: white; font-size: 14px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light text-dark">

    {% include 'partials/header.html' %}

    {% block content %}
    <!-- پیش‌فرض: اسلایدر -->
    <div id="mainCarousel" class="carousel slide mt-3" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://via.placeholder.com/1200x400?text=بنر+اول" class="d-block w-100" alt="بنر اول">
            </div>
            <div class="carousel-item">
                <img src="https://via.placeholder.com/1200x400?text=بنر+دوم" class="d-block w-100" alt="بنر دوم">
            </div>
            <div class="carousel-item">
                <img src="https://via.placeholder.com/1200x400?text=بنر+سوم" class="d-block w-100" alt="بنر سوم">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            <span class="visually-hidden">قبلی</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
            <span class="visually-hidden">بعدی</span>
        </button>
    </div>
    {% endblock %}

    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
